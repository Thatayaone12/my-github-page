<html lang="en">
<head>

  <!-- Font Awesome for better icons (standard improvement) -->

  <!--Custom CSS-->

</head>
<body>
  <header>
       <!-- Your content goes here -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">My Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html" aria-current="page">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
  </header>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <h2 class="text-center mb-4">Contact Me</h2>
        
        <!-- Your original paragraph and email link kept EXACTLY (only fixed the broken mailto href to match the real email) -->
        <p class="text-center lead mb-5">
          If you'd like to get in touch, feel free to email me at 
          <a href="mailto:bida25-239@thuto.bac.ac.bw" class="btn btn-success btn-lg">
            bida25-239@thuto.bac.ac.bw
          </a>
        </p>

        <!-- Added necessary professional contact form (standard for any "Contact Me" page) -->
        <div class="row g-5">
          <div class="col-lg-7">
            <div class="card shadow-sm">
              <div class="card-body p-4">
                <h4 class="card-title mb-4">Send Me a Message</h4>
                <form action="#" method="POST" id="contactForm">
                  <div class="mb-3">
                    <label class="form-label">Your Full Name</label>
                    <input type="text" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Your Email Address</label>
                    <input type="email" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="6" required></textarea>
                  </div>
                  <button type="submit" class="btn btn-success w-100 py-3">
                    <i class="fas fa-paper-plane me-2"></i>Send Message
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Added useful contact info panel -->
          <div class="col-lg-5">
            <div class="card h-100 shadow-sm">
              <div class="card-body p-4">
                <h4 class="card-title mb-4">Other Contact Details</h4>
                <ul class="list-unstyled">
                  <li class="mb-4">
                    <i class="fas fa-envelope text-success fa-2x mb-3"></i>
                    <h6>Email</h6>
                    <a href="mailto:bida25-239@thuto.bac.ac.bw" class="text-decoration-none">bida25-239@thuto.bac.ac.bw</a>
                  </li>
                  <li class="mb-4">
                    <i class="fas fa-map-marker-alt text-success fa-2x mb-3"></i>
                    <h6>Location</h6>
                    <p class="mb-0">Gaborone, Botswana</p>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p>&copy; 2026 Thatayaone Rodney Brooks</p>
    </div>
  </footer>

  <!-- Bootstrap JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

  <!-- Simple form feedback (demo only) -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('✅ Thank you! Your message has been received (demo).');
      this.reset();
    });
  </script>
</body>
</html>
